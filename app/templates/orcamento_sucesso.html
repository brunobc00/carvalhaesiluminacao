{% extends "base.html" %}

{% block title %}Orçamento Enviado — Carvalhaes Iluminação{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 sm:px-6 lg:px-8 py-24 text-center">

    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
    </div>

    <h1 class="text-3xl font-bold text-gray-900 mb-4">Orçamento enviado!</h1>
    <p class="text-gray-500 text-lg mb-2">
        Obrigado pelo seu contato.
    </p>
    <p class="text-gray-500 mb-10">
        Recebemos a sua solicitação e entraremos em contato em breve.
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a href="/produtos"
           class="bg-amber-500 hover:bg-amber-600 text-white font-semibold px-8 py-3 rounded-xl transition-colors">
            Ver mais produtos
        </a>
        <a href="/"
           class="border border-gray-200 text-gray-600 hover:bg-gray-50 font-semibold px-8 py-3 rounded-xl transition-colors">
            Voltar ao início
        </a>
    </div>
</div>
{% endblock %}
