networks:
  infra-net:
    external: true
    name: infra-net

services:
  app:
    build: .
    ports:
      - "8002:8000"
    mem_limit: 256m
    cpus: 0.5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/bruno/Documentos/Github/carvalhaesiluminacao:/project
      - uploads:/app/uploads
    env_file: .env
    networks:
      - infra-net
    restart: unless-stopped

volumes:
  uploads:
