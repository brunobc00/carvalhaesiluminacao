networks:
  infra-net:
    external: true
    name: infra-net

services:
  app:
    build: .
    ports:
      - "8002:8000"
    mem_limit: 512m
    cpus: 0.5
    extra_hosts:
      - "host.docker.internal:host-gateway"   # acessa Ollama no host (fallback de visão)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Deploy via webhook GitHub (deploy-hook). /project = raiz de deploy no servidor.
      - /home/bruno-server/docker/com.automacaobbc.carvalhaesiluminacao:/project
      - uploads:/app/uploads
    env_file: .env
    networks:
      - infra-net
    restart: unless-stopped

volumes:
  # Volume externo fixo: preserva as fotos dos produtos mesmo após o rename do
  # projeto (carvalhaesiluminacao → com.automacaobbc.carvalhaesiluminacao).
  uploads:
    external: true
    name: carvalhaesiluminacao_uploads
