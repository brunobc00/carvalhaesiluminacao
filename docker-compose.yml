networks:
  infra-net:
    external: true
    name: infra-net

services:
  app:
    build: .
    ports:
      - "8002:8000"
    mem_limit: 256m
    cpus: 0.5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Deploy canônico via docker-migration/deploy.sh (rsync deste PC → servidor).
      # /project aponta para a raiz de deploy no servidor (não mais para a antiga
      # cópia rsync /home/bruno/Documentos/Github, que foi removida).
      - /home/bruno-server/docker/carvalhaesiluminacao:/project
      - uploads:/app/uploads
    env_file: .env
    networks:
      - infra-net
    restart: unless-stopped

volumes:
  uploads:
